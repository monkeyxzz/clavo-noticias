<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel · Clavo Records Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --gold:#c9a24a; --gold-dim:#8a6f33; --bg:#0b0a08; --panel:#15120c;
    --panel2:#1d1810; --line:#2a2316; --text:#ece6da; --muted:#9a917f;
    --live:#ff5252;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font-family:"Inter",system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  a { color:var(--gold-dim); }
  .wrap { max-width:860px; margin:0 auto; padding:0 18px 80px; }

  .topbar { display:flex; align-items:center; gap:12px; padding:14px 18px;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(11,10,8,.9);
    backdrop-filter:blur(8px); z-index:10; }
  .brand { font-family:"Cinzel",serif; font-weight:700; letter-spacing:3px; color:var(--gold); font-size:15px; }
  .topbar .sp { margin-left:auto; }
  .topbar a { font-size:12px; }

  h1 { font-family:"Cinzel",serif; font-weight:500; font-size:22px; margin:28px 0 4px; }
  .sub { color:var(--muted); font-size:13px; margin:0 0 22px; }

  .card { background:var(--panel); border:1px solid var(--line); border-radius:12px;
    padding:16px; margin-bottom:18px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--gold-dim);
    margin:0 0 12px; font-weight:600; }

  label { display:block; font-size:12px; color:var(--muted); margin:0 0 5px; }
  input, select { width:100%; font:inherit; font-size:14px; color:var(--text);
    background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:9px 11px; }
  input::placeholder { color:#6b6557; }

  .row { display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; }
  .row > * { flex:1; min-width:120px; }
  .row .grow2 { flex:2; }

  button { font:inherit; font-size:13px; font-weight:600; cursor:pointer;
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:8px; padding:9px 14px; transition:border-color .12s, background .12s; }
  button:hover { border-color:var(--gold-dim); }
  button.gold { background:var(--gold); border-color:var(--gold); color:#1a1407; }
  button.gold:hover { filter:brightness(1.08); }
  button.icon { padding:6px 9px; flex:0 0 auto; min-width:0; }

  /* lista */
  .item { display:flex; gap:11px; align-items:center; padding:9px;
    border:1px solid var(--line); border-radius:10px; margin-bottom:9px; background:var(--panel2); }
  .item img { width:74px; height:42px; object-fit:cover; border-radius:5px; background:#000; flex:0 0 auto; }
  .item .main { flex:1; min-width:0; }
  .item .main input { font-size:13px; padding:6px 8px; }
  .item .meta { display:flex; gap:8px; align-items:center; margin-top:5px; }
  .item .meta select { width:auto; font-size:12px; padding:4px 8px; }
  .badge { font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
    padding:2px 7px; border-radius:5px; border:1px solid var(--line); color:var(--muted); }
  .badge.live { color:var(--live); border-color:var(--live); }
  .badge.short { color:var(--gold); border-color:var(--gold-dim); }
  .item .ctrls { display:flex; gap:5px; flex:0 0 auto; }

  .empty { color:var(--muted); font-size:14px; text-align:center; padding:24px; }

  .savebar { position:fixed; bottom:0; left:0; right:0; padding:12px 18px;
    background:rgba(11,10,8,.92); backdrop-filter:blur(8px); border-top:1px solid var(--line);
    display:flex; gap:12px; align-items:center; justify-content:center; }
  .savebar .count { font-size:12px; color:var(--muted); margin-right:auto; }
  #toast { font-size:13px; }
  #toast.ok { color:#5fcf80; } #toast.err { color:var(--live); }
</style>
</head>
<body>
<div class="topbar">
  <span class="brand">CLAVO&nbsp;RECORDS</span>
  <span style="font-size:12px;color:var(--muted)">· Panel del wall</span>
  <span class="sp"></span>
  <a href="/" target="_blank" rel="noopener">ver wall ↗</a>
</div>

<div class="wrap">
  <h1>Editar videos del wall</h1>
  <p class="sub">Agrega lives, videos musicales y shorts. Pega la URL de YouTube, ajusta el tipo y guarda.</p>

  <!-- CLAVE -->
  <div class="card">
    <h2>Clave del panel</h2>
    <div class="row">
      <div class="grow2">
        <label>Contraseña (para guardar)</label>
        <input id="pwd" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button id="rememberBtn" type="button">Recordar</button>
    </div>
  </div>

  <!-- AGREGAR -->
  <div class="card">
    <h2>Agregar video</h2>
    <div class="row">
      <div class="grow2">
        <label>URL de YouTube (watch / shorts / live / youtu.be)</label>
        <input id="url" type="url" placeholder="https://youtube.com/shorts/..." />
      </div>
      <button id="resolveBtn" type="button">Resolver</button>
    </div>
    <div class="row" style="margin-top:11px;">
      <div class="grow2">
        <label>Título</label>
        <input id="title" type="text" placeholder="Título (se autollena al resolver)" />
      </div>
      <div>
        <label>Tipo</label>
        <select id="type">
          <option value="music">Musical (16:9)</option>
          <option value="live">En vivo (16:9)</option>
          <option value="short">Short (9:16)</option>
        </select>
      </div>
      <button id="addBtn" class="gold" type="button">+ Agregar</button>
    </div>
  </div>

  <!-- LISTA -->
  <div class="card">
    <h2>Videos en el wall (<span id="n">0</span>)</h2>
    <div id="list"></div>
  </div>
</div>

<div class="savebar">
  <span class="count" id="toast"></span>
  <button id="reloadBtn" type="button">Recargar</button>
  <button id="saveBtn" class="gold" type="button">Guardar cambios</button>
</div>

<script>
const $ = (id) => document.getElementById(id);
let items = [];          // {type, videoId, title}
let pendingVideoId = ""; // del último "Resolver"

/* ---- helpers ---- */
function esc(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function thumb(id){ return `https://i.ytimg.com/vi/${id}/mqdefault.jpg`; }
function toast(msg, ok){ const t=$("toast"); t.textContent=msg; t.className=ok?"ok":"err"; if(msg) setTimeout(()=>{ if(t.textContent===msg){t.textContent="";t.className="";} }, 4000); }
const TYPE_BADGE = { live:"EN VIVO", music:"Musical", short:"Short" };

/* ---- clave (sessionStorage) ---- */
(function initPwd(){
  const saved = sessionStorage.getItem("wall_pwd");
  if (saved) $("pwd").value = saved;
})();
$("rememberBtn").onclick = () => {
  sessionStorage.setItem("wall_pwd", $("pwd").value);
  toast("Clave recordada en esta sesión", true);
};

/* ---- render lista ---- */
function render(){
  $("n").textContent = items.length;
  const list = $("list");
  if (!items.length){ list.innerHTML = `<div class="empty">Sin videos todavía. Agrega arriba.</div>`; return; }
  list.innerHTML = items.map((it,i)=>`
    <div class="item">
      <img src="${thumb(it.videoId)}" alt="" loading="lazy" />
      <div class="main">
        <input data-i="${i}" class="t-title" value="${esc(it.title)}" placeholder="Título" />
        <div class="meta">
          <span class="badge ${it.type}">${TYPE_BADGE[it.type]||it.type}</span>
          <select data-i="${i}" class="t-type">
            <option value="music"${it.type==="music"?" selected":""}>Musical</option>
            <option value="live"${it.type==="live"?" selected":""}>En vivo</option>
            <option value="short"${it.type==="short"?" selected":""}>Short</option>
          </select>
          <span class="badge">${it.videoId}</span>
        </div>
      </div>
      <div class="ctrls">
        <button class="icon" data-up="${i}" title="Subir">↑</button>
        <button class="icon" data-down="${i}" title="Bajar">↓</button>
        <button class="icon" data-del="${i}" title="Borrar">🗑</button>
      </div>
    </div>`).join("");
}

/* edición inline + controles (delegación) */
$("list").addEventListener("input", (e)=>{
  const ti = e.target.closest(".t-title"); if (ti){ items[+ti.dataset.i].title = ti.value; return; }
  const ty = e.target.closest(".t-type"); if (ty){ items[+ty.dataset.i].type = ty.value; render(); }
});
$("list").addEventListener("click", (e)=>{
  const up=e.target.closest("[data-up]"), dn=e.target.closest("[data-down]"), del=e.target.closest("[data-del]");
  if (up){ const i=+up.dataset.up; if(i>0){ [items[i-1],items[i]]=[items[i],items[i-1]]; render(); } }
  else if (dn){ const i=+dn.dataset.down; if(i<items.length-1){ [items[i+1],items[i]]=[items[i],items[i+1]]; render(); } }
  else if (del){ items.splice(+del.dataset.del,1); render(); }
});

/* ---- resolver URL ---- */
$("resolveBtn").onclick = async () => {
  const url = $("url").value.trim();
  if (!url) return;
  toast("Resolviendo…", true);
  try {
    const r = await fetch("/api/resolve?url=" + encodeURIComponent(url));
    const d = await r.json();
    if (!r.ok || !d.videoId){ toast(d.error || "No se pudo resolver", false); return; }
    pendingVideoId = d.videoId;
    $("title").value = d.title || "";
    $("type").value = d.type || "music";
    toast("Resuelto: " + d.videoId, true);
  } catch { toast("Error de red", false); }
};

/* ---- agregar ---- */
$("addBtn").onclick = async () => {
  let id = pendingVideoId;
  const url = $("url").value.trim();
  if (!id && url){   // permitir agregar sin resolver: intentar resolver rápido
    try { const r=await fetch("/api/resolve?url="+encodeURIComponent(url)); const d=await r.json(); if(d.videoId){ id=d.videoId; if(!$("title").value) $("title").value=d.title||""; if($("type").value==="music"&&d.type) $("type").value=d.type; } } catch {}
  }
  if (!/^[A-Za-z0-9_-]{11}$/.test(id)){ toast("Resuelve una URL válida primero", false); return; }
  items.push({ type: $("type").value, videoId: id, title: $("title").value.trim() });
  pendingVideoId = ""; $("url").value=""; $("title").value="";
  render();
  toast("Agregado", true);
};

/* ---- guardar ---- */
$("saveBtn").onclick = async () => {
  const pwd = $("pwd").value;
  if (!pwd){ toast("Pon la contraseña", false); return; }
  toast("Guardando…", true);
  try {
    const r = await fetch("/api/wall", {
      method:"POST",
      headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+pwd },
      body: JSON.stringify({ items })
    });
    const d = await r.json();
    if (r.status===401){ toast("Contraseña incorrecta", false); return; }
    if (!r.ok){ toast(d.error || "Error al guardar", false); return; }
    sessionStorage.setItem("wall_pwd", pwd);
    toast(`Guardado · ${d.count} videos. El wall se actualiza en segundos.`, true);
  } catch { toast("Error de red", false); }
};

/* ---- cargar lista actual ---- */
async function load(){
  try {
    const r = await fetch("/api/wall", { headers:{Accept:"application/json"} });
    const d = await r.json();
    items = Array.isArray(d.items) ? d.items.map(x=>({type:x.type,videoId:x.videoId,title:x.title||""})) : [];
  } catch { items = []; }
  render();
}
$("reloadBtn").onclick = load;
load();
</script>
</body>
</html>
